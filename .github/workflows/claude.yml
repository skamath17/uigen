name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Project setup
        run: |
          # Add any setup steps here, such as installing dependencies or setting up the environment
          echo "Setting up project environment..."
          # Example: npm install
          npm install
          npx playwright install --with-deps chromium
          npm run setup
          npm run dev:daemon
          sleep 5

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read
          
          custom_instructions: |
            # You can provide custom instructions to Claude here. This will override the default behavior of performing the instructions specified in the comment that tagged it.
            # For example, you could specify a custom prompt or additional arguments for Claude.
            The project is set up. Server runs at localhost:3000. Logs in logs.txt.
            IMPORTANT: You have access to a real browser via mcp__playwright tools.
            Always use the browser to visually verify UI behavior — do not just do static code analysis.
            Use mcp__playwright__browser_navigate to open localhost:3000, then interact with the UI.
            
          mcp_config: |
            {
              "mcpServers": {
                "playwright": {
                  "command": "npx",
                  "args": ["@playwright/mcp@latest", "--allowed-origins", "http://localhost:3000;cdn.tailwindcss.com;esm.sh"]
                }
              }
            }
    
          allowed_tools: "Bash(npm:*),Bash(sqlite3:*),Bash(sleep:*),mcp__playwright__browser_snapshot,mcp__playwright__browser_click,mcp__playwright__browser_navigate,mcp__playwright__browser_type,mcp__playwright__browser_wait_for,mcp__playwright__browser_scroll"


          # Optional: Give a custom prompt to Claude. If this is not specified, Claude will perform the instructions specified in the comment that tagged it.
          # prompt: 'Update the pull request description to include a summary of changes.'

          # Optional: Add claude_args to customize behavior and configuration
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          # claude_args: '--allowed-tools Bash(gh pr *)'

