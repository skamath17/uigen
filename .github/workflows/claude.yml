name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Project setup
        run: |
          # Add any setup steps here, such as installing dependencies or setting up the environment
          echo "Setting up project environment..."
          # Example: npm install
          npm run setup
          npm run dev:daemon

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read
          
          custom_instructions: |
            # You can provide custom instructions to Claude here. This will override the default behavior of performing the instructions specified in the comment that tagged it.
            # For example, you could specify a custom prompt or additional arguments for Claude.
            The project is already setup with all dependencies installed. The server is already running at localhost:3000. Logs from it are being written to logs.txt.
            If needed, you can query the db with the 'sqlite3' cli. If needed, use the mcp__playwright set of tools to launch the browser and interact with the UI.
            
          mcp_config: |
            # If you want to use the mcp tools, you can specify the configuration for the mcp tools here. This is optional and only needed if you want to use the mcp tools.
            # For example, you could specify the configuration for the mcp__playwright tool here.
            mcp__playwright:
              {
                "mcpServers": {
                  "playwright": {
                    "command": "npx",
                    "args": [
                      "@playwright/mcp@latest",
                      "--allowed-origins",
                      "http://localhost:3000;cdn.tailwindcss.com;esm.sh"
                    ]
                    }
                  }
                }
    
          allowed_tools: "Bash(npm:*),Bash(sqlite3:*),mcp__playwright__browser_snapshot,mcp__playwright__browser_click"


          # Optional: Give a custom prompt to Claude. If this is not specified, Claude will perform the instructions specified in the comment that tagged it.
          # prompt: 'Update the pull request description to include a summary of changes.'

          # Optional: Add claude_args to customize behavior and configuration
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          # claude_args: '--allowed-tools Bash(gh pr *)'

